# ============================================================
#  Campsite Availability Checker — Configuration
#  Copy this to config.yaml and fill in your email credentials.
# ============================================================

# --- Email notification settings ---
email:
  smtp_server: "smtp.gmail.com"
  smtp_port: 587
  sender_email: "your-email@gmail.com"
  sender_password: "your-app-password"        # Gmail App Password
  recipient_email: "your-email@gmail.com"

# --- Check settings ---
check_interval_minutes: 30
nights: 2

# --- Date ranges to monitor (MM/DD/YYYY) ---
date_ranges:
  - start: "05/01/2026"
    end:   "05/31/2026"
  - start: "06/01/2026"
    end:   "06/30/2026"
  - start: "07/01/2026"
    end:   "07/31/2026"

